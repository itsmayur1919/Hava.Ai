name: Build and Release Android APK

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for distribution'
        required: false
        default: 'Internal testing build'

jobs:
  build_and_release:
    name: Build Signed APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0
          components: platform-tools,cmdline-tools;latest,build-tools;34.0.0,platforms;android-34

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Create debug keystore for testing (if no signing key provided)
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 == '' }}
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -keypass android -storepass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"
          echo "DEBUG_KEYSTORE_PATH=$(pwd)/debug.keystore" >> $GITHUB_ENV

      - name: Decode release keystore (if available)
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "RELEASE_KEYSTORE_PATH=$(pwd)/release.keystore" >> $GITHUB_ENV

      - name: Build release APK
        run: |
          cd android
          if [ -n "$RELEASE_KEYSTORE_PATH" ] && [ -f "$RELEASE_KEYSTORE_PATH" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$RELEASE_KEYSTORE_PATH \
              -Pandroid.injected.signing.store.password=${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.RELEASE_KEY_ALIAS || 'androiddebugkey' }} \
              -Pandroid.injected.signing.key.password=${{ secrets.RELEASE_KEY_PASSWORD || 'android' }} \
              --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
          else
            ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
          fi

      - name: Build release AAB (for Play Store)
        run: |
          cd android
          if [ -n "$RELEASE_KEYSTORE_PATH" ] && [ -f "$RELEASE_KEYSTORE_PATH" ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$RELEASE_KEYSTORE_PATH \
              -Pandroid.injected.signing.store.password=${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.RELEASE_KEY_ALIAS || 'androiddebugkey' }} \
              -Pandroid.injected.signing.key.password=${{ secrets.RELEASE_KEY_PASSWORD || 'android' }} \
              --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload to Firebase App Distribution
        if: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TOKEN != '' }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TOKEN }}
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ github.event.inputs.release_notes || 'Internal testing build - ' }}${{ github.event.head_commit.message }}
          groups: testers

      - name: Create Release Notes
        if: success()
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "## HavaMan AI APK Release - $TIMESTAMP" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Build Info:**" >> RELEASE_NOTES.md
          echo "- Commit: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "- Branch: ${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "- Author: ${{ github.actor }}" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Release Notes:**" >> RELEASE_NOTES.md
          echo "${{ github.event.inputs.release_notes || 'Internal testing build' }}" >> RELEASE_NOTES.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 30

      - name: Print build summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Debug APK: ${{ job.status }}"
          echo "Release APK: android/app/build/outputs/apk/release/app-release.apk"
          echo "Release AAB: android/app/build/outputs/bundle/release/app-release.aab"
          echo "Artifacts available in GitHub Actions"
